<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anypress Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">📊 Anypress</h1>
      </div>
      <div class="header-right">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Checking...</span>
      </div>
    </header>

    <!-- Main Layout -->
    <main class="main-grid">
      <!-- Left Column -->
      <div class="left-col">
        <!-- Sync Panel -->
        <section class="panel" id="syncPanel">
          <div class="panel-header">
            <h2>🔄 Anytype Sync</h2>
            <button class="btn btn-primary btn-sm" id="btnSync" onclick="syncContent()">
              <span class="btn-icon">🔄</span> Sync Now
            </button>
          </div>
          <div class="panel-body">
            <div class="sync-info" id="syncInfo">
              <span class="text-muted">Click Sync để lấy bài từ Anytype</span>
            </div>
            <div class="spaces-list" id="spacesList"></div>
          </div>
        </section>

        <!-- Content Panel -->
        <section class="panel" id="contentPanel">
          <div class="panel-header">
            <h2>📋 Nội dung</h2>
            <div class="panel-actions">
              <button class="btn btn-ghost btn-sm" onclick="selectAll()">Chọn tất cả</button>
              <button class="btn btn-ghost btn-sm" onclick="selectNone()">Bỏ chọn</button>
              <button class="btn btn-secondary btn-sm" onclick="showNewPostModal()">➕ Mới</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="content-list" id="contentList">
              <div class="loading">Đang tải...</div>
            </div>
          </div>
        </section>
      </div>

      <!-- Right Column -->
      <div class="right-col">
        <!-- Preview Panel -->
        <section class="panel" id="previewPanel">
          <div class="panel-header">
            <h2>👁️ Preview</h2>
            <div class="panel-actions">
              <button class="btn btn-secondary btn-sm" id="btnPreviewToggle" onclick="togglePreview()">
                ▶️ Start Preview
              </button>
            </div>
          </div>
          <div class="panel-body preview-body">
            <div class="preview-placeholder" id="previewPlaceholder">
              <p>Chọn bài viết để xem preview</p>
              <p class="text-muted">Hoặc nhấn Start Preview để chạy Quartz local</p>
            </div>
            <iframe id="previewFrame" class="preview-frame hidden" src=""></iframe>
          </div>
        </section>

        <!-- CI/CD Panel -->
        <section class="panel panel-compact" id="ciPanel">
          <div class="panel-header">
            <h2>⚙️ CI/CD</h2>
            <button class="btn btn-ghost btn-sm" onclick="refreshCI()">🔄</button>
          </div>
          <div class="panel-body">
            <div class="ci-list" id="ciList">
              <span class="text-muted">Đang tải...</span>
            </div>
          </div>
        </section>

        <!-- Deploy Panel -->
        <section class="panel panel-deploy">
          <div class="panel-header">
            <h2>🚀 Deploy</h2>
          </div>
          <div class="panel-body">
            <div class="deploy-info">
              <span id="selectedCount">0</span> file được chọn
            </div>
            <div class="deploy-actions">
              <button class="btn btn-primary btn-lg" id="btnDeploy" onclick="deploySelected()" disabled>
                🚀 Publish Selected
              </button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- New Post Modal -->
    <div class="modal hidden" id="newPostModal">
      <div class="modal-backdrop" onclick="hideNewPostModal()"></div>
      <div class="modal-content">
        <h3>➕ Tạo bài viết mới</h3>
        <input type="text" id="newPostTitle" placeholder="Tiêu đề bài viết..." class="input" autofocus>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="hideNewPostModal()">Hủy</button>
          <button class="btn btn-primary" onclick="createNewPost()">Tạo</button>
        </div>
      </div>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
